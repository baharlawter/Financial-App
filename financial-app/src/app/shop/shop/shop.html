<div class="shop-container">
  <h2>📚 Book Shop</h2>
  <div>
    <div class="books-div">
      <ul>
        <li *ngFor="let book of books">
          <img class="books" [src]="book.image" alt="{{ book.title }}" />
          <h3 class="title">{{ book.title }}</h3>
          <p class="price">{{ book.price }}</p>
        </li>
      </ul>
    </div>
  </div>
</div>
